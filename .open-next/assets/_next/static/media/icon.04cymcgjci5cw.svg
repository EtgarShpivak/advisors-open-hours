<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0A1120"/>
  <!-- Clock face -->
  <circle cx="16" cy="16" r="9" stroke="#38BDF8" stroke-width="1.8" fill="none"/>
  <!-- Clock hands -->
  <line x1="16" y1="16" x2="16" y2="10" stroke="#38BDF8" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20" y2="19" stroke="#38BDF8" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.2" fill="#38BDF8"/>
</svg>
